name: Publish to PyPI

# Publishes the package when you cut a GitHub Release.
# Uses PyPI Trusted Publishing (OIDC) — no API tokens or secrets to manage.
# One-time setup on PyPI: create the project's trusted publisher pointing at
#   owner: abhijeetgupta02   repo: vlm-eval-harness   workflow: publish.yml   environment: pypi
# See: https://docs.pypi.org/trusted-publishers/

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write        # required for Trusted Publishing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
